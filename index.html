<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mahoraga AR — Raise Both Fists</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    #webcam {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 1;
    }

    #three-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    /* ── Overlay UI ── */
    #ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    /* Hand fist indicators */
    #hand-status {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .hand-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.25);
      transition: all 0.15s ease;
    }

    .hand-dot.fist {
      background: rgba(255, 60, 60, 0.85);
      border-color: rgba(255, 120, 120, 1);
      box-shadow: 0 0 16px rgba(255, 60, 60, 0.9), 0 0 32px rgba(255, 0, 0, 0.4);
    }

    .hand-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .hand-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }

    /* Charge ring */
    #charge-wrap {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 130px;
      height: 130px;
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    #charge-wrap.visible {
      opacity: 1;
    }

    #charge-wrap svg {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .charge-track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 5;
    }

    .charge-fill {
      fill: none;
      stroke: rgba(255, 60, 60, 0.9);
      stroke-width: 5;
      stroke-linecap: round;
      r: 56;
      cx: 65;
      cy: 65;
      stroke-dasharray: 351.86;
      stroke-dashoffset: 351.86;
      filter: drop-shadow(0 0 6px rgba(255,0,0,0.8));
      transition: stroke-dashoffset 0.05s linear;
    }

    /* ── Gesture Island ── */
    #gesture-island {
      position: fixed;
      bottom: 22px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(8, 8, 8, 0.9);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 20px;
      overflow: hidden;
      width: 240px;
      max-height: 46px;
      pointer-events: auto;
      transition:
        width      0.52s cubic-bezier(0.32, 0.72, 0, 1),
        max-height 0.52s cubic-bezier(0.32, 0.72, 0, 1),
        border-radius 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    }

    #gesture-island.expanded {
      width: 300px;
      max-height: 220px;
      border-radius: 26px;
    }

    /* Always-visible header row */
    .gi-header {
      height: 46px;
      padding: 0 6px 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #gi-status {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    /* After expand, header label changes to section title */
    #gesture-island.expanded #gi-status {
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.28);
    }

    .gi-btns {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    .gi-btn {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      line-height: 1;
    }

    .gi-btn:hover { background: rgba(255,255,255,0.15); }

    /* Expandable gesture rows — hidden until island opens */
    #gi-expandable {
      opacity: 0;
      padding: 0 16px 14px;
      transition: opacity 0.22s 0.36s;
    }

    #gesture-island.expanded #gi-expandable { opacity: 1; }

    .gi-divider {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 0 0 10px;
    }

    .gi-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 0;
    }

    .gi-gesture {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    .gi-action {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
    }

    /* ── Start pose hint ── */
    #start-hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.9s ease;
      text-align: center;
    }

    #start-hint.visible { opacity: 1; }

    #start-hint img {
      width: 210px;
      opacity: 0.55;
      filter: drop-shadow(0 0 24px rgba(255,255,255,0.08));
    }

    #start-hint.visible img {
      animation: hint-breathe 3s ease-in-out infinite;
    }

    @keyframes hint-breathe {
      0%, 100% { opacity: 0.55; }
      50%       { opacity: 0.75; }
    }

    #start-hint p {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.06em;
      max-width: 270px;
      line-height: 1.6;
    }

    /* ── Dark Souls summon text ── */
    #summon-text {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 4;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.75s ease;
    }

    #summon-text.visible { opacity: 1; }

    #summon-line {
      display: block;
      font-family: 'Cinzel', 'Garamond', serif;
      text-align: center;
      padding: 0 48px;
    }

    /* Line 1 — "With this treasure, I summon..." */
    #summon-text.line1 #summon-line {
      font-size: clamp(16px, 2.2vw, 30px);
      font-weight: 400;
      letter-spacing: 0.18em;
      color: rgba(215, 200, 170, 0.92);
      text-shadow:
        0 0 40px rgba(200, 160, 70, 0.55),
        0 2px 6px rgba(0, 0, 0, 0.9);
    }

    /* Line 2 — "Eight-Handled Sword Divergent Sila Divine General" */
    #summon-text.line2 #summon-line {
      font-size: clamp(14px, 2vw, 26px);
      font-weight: 700;
      letter-spacing: 0.2em;
      color: rgba(230, 215, 185, 0.95);
      text-shadow:
        0 0 50px rgba(210, 170, 80, 0.65),
        0 2px 6px rgba(0, 0, 0, 0.95);
    }

    /* Line 3 — "MAHORAGA" */
    #summon-text.line3 #summon-line {
      font-size: clamp(52px, 9vw, 110px);
      font-weight: 900;
      letter-spacing: 0.3em;
      color: rgba(255, 245, 215, 1);
      text-shadow:
        0 0 80px rgba(255, 200, 60, 0.85),
        0 0 30px rgba(255, 140, 0, 0.6),
        0 4px 12px rgba(0, 0, 0, 1);
    }

    /* Flash effect */
    #flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
      "fflate": "https://cdn.jsdelivr.net/npm/fflate@0.8.0/esm/index.js"
    }
  }
  </script>
</head>
<body>

<video id="webcam" autoplay playsinline muted></video>
<canvas id="three-canvas"></canvas>
<div id="flash"></div>
<div id="summon-text"><span id="summon-line"></span></div>

<div id="ui">
  <div id="hand-status">
    <div class="hand-group">
      <div class="hand-dot" id="left-dot"></div>
      <span class="hand-label">L</span>
    </div>
    <div class="hand-group">
      <div class="hand-dot" id="right-dot"></div>
      <span class="hand-label">R</span>
    </div>
  </div>

  <div id="charge-wrap">
    <svg viewBox="0 0 130 130">
      <circle class="charge-track" cx="65" cy="65" r="56" />
      <circle class="charge-fill" id="charge-fill" />
    </svg>
  </div>

  </div>
</div>

<!-- Gesture Island — sits outside #ui so pointer-events work independently -->
<div id="gesture-island">
  <div class="gi-header">
    <span id="gi-status">Initializing camera…</span>
    <div class="gi-btns">
      <button class="gi-btn" id="btn-mute" title="Toggle audio">&#128266;</button>
      <button class="gi-btn" id="btn-restart" title="Restart">&#8635;</button>
    </div>
  </div>
  <div id="gi-expandable">
    <hr class="gi-divider">
    <div class="gi-row">
      <span class="gi-gesture">One open hand</span>
      <span class="gi-action">Rotate</span>
    </div>
    <div class="gi-row">
      <span class="gi-gesture">Two hands &middot; pinch</span>
      <span class="gi-action">Zoom</span>
    </div>
    <div class="gi-row">
      <span class="gi-gesture">Two hands &middot; move</span>
      <span class="gi-action">Pan</span>
    </div>
  </div>
</div>


<!-- Start pose hint -->
<div id="start-hint">
  <img src="start%20pose.png" alt="Start pose">
  <p>Put your hands in position to summon the treasure</p>
</div>

<!-- MediaPipe Hands (legacy bundle, no ES module needed) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>

<script type="module">
import * as THREE from 'three';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

// ─── DOM REFS ────────────────────────────────────────────────────────────────
const videoEl   = document.getElementById('webcam');
const flashEl   = document.getElementById('flash');
const statusEl  = document.getElementById('gi-status');
const leftDot   = document.getElementById('left-dot');
const rightDot  = document.getElementById('right-dot');
const chargeWrap = document.getElementById('charge-wrap');
const chargeFill = document.getElementById('charge-fill');

const CIRCUMFERENCE = 2 * Math.PI * 56; // ~351.86

function setStatus(msg) { statusEl.textContent = msg; }

// ─── THREE.JS ────────────────────────────────────────────────────────────────
const threeCanvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, alpha: true, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.setClearColor(0x000000, 0);

const scene  = new THREE.Scene();
const cam3d  = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 5000);
cam3d.position.set(0, 0, 400);

// Lighting — red/dramatic to match a summoning vibe
const ambient = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambient);

const keyLight = new THREE.DirectionalLight(0xff3300, 3);
keyLight.position.set(0, 200, 200);
keyLight.castShadow = true;
scene.add(keyLight);

const rimLight = new THREE.DirectionalLight(0x3355ff, 1.5);
rimLight.position.set(0, -100, -200);
scene.add(rimLight);

const fillLight = new THREE.DirectionalLight(0xffffff, 0.8);
fillLight.position.set(-200, 100, 100);
scene.add(fillLight);

// Single group so hand controls move all models together
const controlGroup = new THREE.Group();
scene.add(controlGroup);

// ─── HAND CONTROL STATE ───────────────────────────────────────────────────────
let hasSummoned = false; // after first summon, fist-charge is disabled
let isIdling  = false;
let ctrlRotX  = 0, ctrlRotY  = 0;
let ctrlScale = 1;
let ctrlPanX  = 0, ctrlPanY  = 0;
let prevHandCtrl = null; // [{x,y}] from last frame

// ─── FBX LOADER ──────────────────────────────────────────────────────────────
let landModel  = null;  let landMixer  = null;  let landAction  = null;
let roarModel  = null;  let roarMixer  = null;  let roarAction  = null;
let idleModel  = null;  let idleMixer  = null;  let idleAction  = null;
let landReady  = false;
let roarReady  = false;
let idleReady  = false;
let isAnimating    = false;
let chargeProgress = 0;


const fbxLoader = new FBXLoader();

const MODEL = { scale: 480, posX: 0, posY: -306, posZ: -80, rotX: 12, rotY: 0, rotZ: 0 };

function applyTransformToModel(fbx) {
  const box    = new THREE.Box3().setFromObject(fbx);
  const size   = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z);
  fbx.scale.setScalar(MODEL.scale / maxDim);

  box.setFromObject(fbx);
  const centre = box.getCenter(new THREE.Vector3());
  const DEG    = Math.PI / 180;
  fbx.position.set(-centre.x + MODEL.posX, -centre.y + MODEL.posY, -centre.z + MODEL.posZ);
  fbx.rotation.set(MODEL.rotX * DEG, MODEL.rotY * DEG, MODEL.rotZ * DEG);

  fbx.traverse(child => {
    if (child.isMesh) {
      child.castShadow = child.receiveShadow = true;
      if (child.material) child.material.side = THREE.DoubleSide;
    }
  });
}

const startHintEl = document.getElementById('start-hint');

function checkAllLoaded() {
  if (landReady && roarReady && idleReady) {
    setStatus('Raise both fists to summon Mahoraga!');
    startHintEl.classList.add('visible');
  }
}

// Load Land.fbx
setStatus('Loading Land.fbx…');
fbxLoader.load('Land.fbx', (fbx) => {
  landModel = fbx;
  applyTransformToModel(fbx);
  fbx.visible = false;
  controlGroup.add(fbx);

  if (fbx.animations?.length) {
    landMixer  = new THREE.AnimationMixer(fbx);
    landAction = landMixer.clipAction(fbx.animations[0]);
    landAction.setLoop(THREE.LoopOnce);
    landAction.clampWhenFinished = true;
  }

  landReady = true;
  checkAllLoaded();
}, null, (err) => {
  console.error('Land.fbx load error:', err);
  setStatus('Land.fbx not found — place it in this folder');
});

// Load Roar.fbx
fbxLoader.load('Roar.fbx', (fbx) => {
  roarModel = fbx;
  applyTransformToModel(fbx);
  fbx.visible = false;
  controlGroup.add(fbx);

  if (fbx.animations?.length) {
    roarMixer  = new THREE.AnimationMixer(fbx);
    roarAction = roarMixer.clipAction(fbx.animations[0]);
    roarAction.setLoop(THREE.LoopOnce);
    roarAction.clampWhenFinished = true;
  }

  roarReady = true;
  checkAllLoaded();
}, (e) => {
  if (e.total) setStatus(`Loading Roar.fbx… ${Math.round(e.loaded/e.total*100)}%`);
}, (err) => {
  console.error('Roar.fbx load error:', err);
  setStatus('Error loading Roar.fbx — check console');
});

// Load Idle.fbx
fbxLoader.load('Idle.fbx', (fbx) => {
  idleModel = fbx;
  applyTransformToModel(fbx);
  fbx.visible = false;
  controlGroup.add(fbx);

  if (fbx.animations?.length) {
    idleMixer  = new THREE.AnimationMixer(fbx);
    idleAction = idleMixer.clipAction(fbx.animations[0]);
    idleAction.setLoop(THREE.LoopRepeat);
  }

  idleReady = true;
  checkAllLoaded();
}, null, (err) => {
  console.error('Idle.fbx load error:', err);
  setStatus('Error loading Idle.fbx — check console');
});


// ─── SUMMON SEQUENCE ──────────────────────────────────────────────────────────
const summonTextEl = document.getElementById('summon-text');
const summonLineEl = document.getElementById('summon-line');

// ── Web Audio ─────────────────────────────────────────────────────────────────
const audioCtx   = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = audioCtx.createGain();
masterGain.connect(audioCtx.destination);
const clipBuffers = []; // filled by preloadAudio()

async function preloadAudio() {
  const urls = [1,2,3,4,5,6].map(i => `clip%20${i}.mp3`);
  const results = await Promise.all(urls.map(async url => {
    try {
      const res = await fetch(url);
      const ab  = await res.arrayBuffer();
      return audioCtx.decodeAudioData(ab);
    } catch { return null; }
  }));
  clipBuffers.push(...results);
}
preloadAudio().catch(console.error);

function playBuffer(buffer, when) {
  if (!buffer) return;
  const src = audioCtx.createBufferSource();
  src.buffer = buffer;
  src.connect(masterGain);
  src.start(when !== undefined ? when : audioCtx.currentTime);
}

// Show a text flash for exactly `holdMs` milliseconds then fade out.
let _summonTimer = null;
function showSummonText(text, cssClass, holdMs) {
  clearTimeout(_summonTimer);
  const wasVisible = summonTextEl.classList.contains('visible');
  summonTextEl.className = cssClass;   // update class (strips visible too)
  summonLineEl.textContent = text;
  if (!wasVisible) {
    // Only force reflow on first appearance so the fade-in transition fires.
    // If already visible, skip it — browser batches the class changes and
    // opacity stays at 1 with no flicker.
    summonTextEl.getBoundingClientRect();
  }
  summonTextEl.classList.add('visible');
  _summonTimer = setTimeout(() => summonTextEl.classList.remove('visible'), holdMs);
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

async function triggerSummon() {
  if (!landReady || !roarReady || isAnimating) return;
  isAnimating = true;
  hasSummoned = true;
  startHintEl.classList.remove('visible');
  setStatus('');

  // Initial flash
  flashEl.style.transition = 'none';
  flashEl.style.opacity = '0.85';
  requestAnimationFrame(() => {
    flashEl.style.transition = 'opacity 0.4s ease-out';
    flashEl.style.opacity = '0';
  });
  keyLight.intensity = 12;
  setTimeout(() => { keyLight.intensity = 3; }, 300);

  // ── Text + audio sequence ──────────────────────────────────────────────────
  // Resume context if browser suspended it (autoplay policy)
  if (audioCtx.state === 'suspended') await audioCtx.resume();

  // Schedule all 4 clips back-to-back with zero gap.
  // Capture origin FIRST so setTimeout delays are relative to the same point.
  const textDefs = [
    { text: 'With this treasure, I summon...', cssClass: 'line1' },
    { text: 'Eight-Handled Sword',              cssClass: 'line2' },
    { text: 'Divergent Sila Divine General',    cssClass: 'line2' },
    { text: 'MAHORAGA',                         cssClass: 'line3' },
  ];

  const origin  = audioCtx.currentTime;
  let   schedAt = origin;

  textDefs.forEach((def, i) => {
    const buf      = clipBuffers[i];
    const duration = buf ? buf.duration : 2;
    const startMs  = (schedAt - origin) * 1000;

    if (buf) playBuffer(buf, schedAt);
    setTimeout(() => showSummonText(def.text, def.cssClass, duration * 1000), startMs);
    schedAt += duration;
  });

  // Wait for last clip to finish + text fade-out
  const totalMs = (schedAt - origin) * 1000 + 800;
  await delay(totalMs);

  // ── FBX sequence ──────────────────────────────────────────────────────────
  if (roarModel) roarModel.visible = false;
  if (landModel) {
    landModel.visible = true;
    if (landAction) {
      landAction.reset();
      landAction.setEffectiveTimeScale(0.6); // ~40% slower
      landAction.play();
      playBuffer(clipBuffers[4]); // clip 5 in sync with Land.fbx

      const onLandDone = () => {
        landMixer.removeEventListener('finished', onLandDone);
        landModel.visible = false;
        playRoar();
      };
      landMixer.addEventListener('finished', onLandDone);
    } else {
      landModel.visible = false;
      playRoar();
    }
  } else {
    playRoar();
  }
}

// Step 2: Roar.fbx — play once then hand off to Idle
function playRoar() {
  if (!roarModel) { playIdle(); return; }
  roarModel.visible = true;
  playBuffer(clipBuffers[5]); // clip 6 in sync with Roar.fbx
  if (roarAction) {
    roarAction.reset();
    roarAction.play();

    const onRoarDone = () => {
      roarMixer.removeEventListener('finished', onRoarDone);
      roarModel.visible = false;
      playIdle();
    };
    roarMixer.addEventListener('finished', onRoarDone);
  } else {
    setTimeout(() => { roarModel.visible = false; playIdle(); }, 3000);
  }
}

// Step 3: Idle.fbx — loop until restart
function playIdle() {
  if (!idleModel) { finish(); return; }
  idleModel.visible = true;
  if (idleAction) {
    idleAction.reset();
    idleAction.play();
  }
  isIdling = true;
  finish();
}

function finish() {
  isAnimating = false;
  if (isIdling) {
    setStatus('Hand Controls');
    document.getElementById('gesture-island').classList.add('expanded');
  }
}

// ─── RENDER LOOP ─────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

// Subtle idle rotation for fbxModel
function animateScene() {
  requestAnimationFrame(animateScene);
  const delta = clock.getDelta();

  if (landMixer) landMixer.update(delta);
  if (roarMixer) roarMixer.update(delta);
  if (idleMixer) idleMixer.update(delta);

  // Apply hand control transforms during idle
  if (isIdling) {
    controlGroup.rotation.x = ctrlRotX;
    controlGroup.rotation.y = ctrlRotY;
    controlGroup.scale.setScalar(ctrlScale);
    controlGroup.position.x = ctrlPanX;
    controlGroup.position.y = ctrlPanY;
  }

  // Pulse key light during charge
  if (chargeProgress > 0 && !isAnimating) {
    keyLight.intensity = 3 + Math.sin(Date.now() * 0.01) * chargeProgress * 4;
  }

  renderer.render(scene, cam3d);
}
animateScene();

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(window.innerWidth, window.innerHeight);
  cam3d.aspect = window.innerWidth / window.innerHeight;
  cam3d.updateProjectionMatrix();
});

// ─── MEDIAPIPE HANDS ─────────────────────────────────────────────────────────
let leftFist  = false;
let rightFist = false;
let chargeStart = null;
const CHARGE_MS = 700; // hold time before summon

function isFist(lm) {
  // Finger tips:  index=8, middle=12, ring=16, pinky=20
  // Finger MCPs:  index=5, middle=9,  ring=13, pinky=17
  const tips = [8, 12, 16, 20];
  const mcps = [5,  9, 13, 17];
  let bent = 0;
  for (let i = 0; i < 4; i++) {
    // In image coords y increases downward;
    // a curled finger tip will be below (higher y than) its MCP
    if (lm[tips[i]].y > lm[mcps[i]].y) bent++;
  }
  return bent >= 3;
}

const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.5
});

hands.onResults((results) => {
  leftFist  = false;
  rightFist = false;

  if (results.multiHandLandmarks) {
    for (let i = 0; i < results.multiHandLandmarks.length; i++) {
      const lm    = results.multiHandLandmarks[i];
      // MediaPipe reports from its own POV; with mirrored video
      // model's "Left" = user's right and vice-versa
      const label = results.multiHandedness[i].label; // 'Left' | 'Right'
      const fist  = isFist(lm);
      if (label === 'Left')  rightFist = fist;
      else                   leftFist  = fist;
    }
  }

  // Update dots
  leftDot.classList.toggle('fist',  leftFist);
  rightDot.classList.toggle('fist', rightFist);

  const both = leftFist && rightFist;

  if (both && !isAnimating && !hasSummoned) {
    if (!chargeStart) chargeStart = performance.now();
    chargeProgress = Math.min((performance.now() - chargeStart) / CHARGE_MS, 1);

    chargeWrap.classList.add('visible');
    chargeFill.style.strokeDashoffset = CIRCUMFERENCE * (1 - chargeProgress);

    if (chargeProgress >= 1) {
      resetCharge();
      triggerSummon();
    }
  } else {
    resetCharge();
  }

  // ── Hand control (idle mode only) ──────────────────────────────────────────
  if (isIdling && results.multiHandLandmarks) {
    // Collect open-hand palm centres (ignore fists — they're for summoning)
    const openHands = [];
    for (let i = 0; i < results.multiHandLandmarks.length; i++) {
      const lm = results.multiHandLandmarks[i];
      if (!isFist(lm)) {
        // Palm centre = average of wrist(0) + 4 knuckles(5,9,13,17)
        const cx = (lm[0].x + lm[5].x + lm[9].x + lm[13].x + lm[17].x) / 5;
        const cy = (lm[0].y + lm[5].y + lm[9].y + lm[13].y + lm[17].y) / 5;
        openHands.push({ x: cx, y: cy });
      }
    }

    if (prevHandCtrl && openHands.length > 0 && prevHandCtrl.length === openHands.length) {
      if (openHands.length === 1) {
        // One open hand → rotate
        // Negate X delta because video is mirrored
        const dx = -(openHands[0].x - prevHandCtrl[0].x);
        const dy =   openHands[0].y - prevHandCtrl[0].y;
        ctrlRotY += dx * 8;
        ctrlRotX += dy * 8;
      } else if (openHands.length === 2) {
        // Two open hands → pinch to zoom + pan
        const currDist = Math.hypot(openHands[0].x - openHands[1].x, openHands[0].y - openHands[1].y);
        const prevDist = Math.hypot(prevHandCtrl[0].x - prevHandCtrl[1].x, prevHandCtrl[0].y - prevHandCtrl[1].y);
        if (prevDist > 0.01) {
          ctrlScale *= currDist / prevDist;
          ctrlScale  = Math.max(0.3, Math.min(4, ctrlScale));
        }

        // Midpoint movement → pan
        const currMidX = (openHands[0].x + openHands[1].x) / 2;
        const currMidY = (openHands[0].y + openHands[1].y) / 2;
        const prevMidX = (prevHandCtrl[0].x + prevHandCtrl[1].x) / 2;
        const prevMidY = (prevHandCtrl[0].y + prevHandCtrl[1].y) / 2;
        ctrlPanX += -(currMidX - prevMidX) * 600;
        ctrlPanY += -(currMidY - prevMidY) * 500;
      }
    }

    prevHandCtrl = openHands.length > 0 ? openHands : null;
  } else if (!isIdling) {
    prevHandCtrl = null;
  }
});

function resetCharge() {
  chargeStart = null;
  chargeProgress = 0;
  chargeWrap.classList.remove('visible');
  chargeFill.style.strokeDashoffset = CIRCUMFERENCE;
}

// ─── CAMERA ──────────────────────────────────────────────────────────────────
async function startCamera() {
  if (!navigator.mediaDevices?.getUserMedia) {
    setStatus('⚠ Camera unavailable — must open via https://localhost:8443 (run serve.py)');
    return;
  }
  setStatus('Requesting camera…');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    videoEl.srcObject = stream;
    videoEl.play().catch(() => {}); // autoplay may handle it; ignore the rejection

    await new Promise((resolve) => {
      if (videoEl.readyState >= HTMLMediaElement.HAVE_ENOUGH_DATA) return resolve();
      videoEl.addEventListener('loadeddata', resolve, { once: true });
    });

    setStatus('Camera active — loading hands model…');

    let handModelReady = false;
    // Warm up MediaPipe — first send can take a moment
    await hands.send({ image: videoEl });
    handModelReady = true;

    async function processFrame() {
      if (videoEl.readyState >= HTMLMediaElement.HAVE_ENOUGH_DATA) {
        await hands.send({ image: videoEl });
      }
      requestAnimationFrame(processFrame);
    }
    processFrame();

    if (modelReady) {
      setStatus('Raise both fists to summon Mahoraga!');
    } else {
      setStatus('Loading Roar.fbx…');
    }
  } catch (err) {
    setStatus(`Camera error: ${err.message}`);
    console.error(err);
  }
}

// ─── MUTE TOGGLE ─────────────────────────────────────────────────────────────
let muted = false;
document.getElementById('btn-mute').addEventListener('click', () => {
  muted = !muted;
  masterGain.gain.setTargetAtTime(muted ? 0 : 1, audioCtx.currentTime, 0.05);
  document.getElementById('btn-mute').innerHTML = muted ? '&#128263;' : '&#128266;';
});

// ─── RESTART ─────────────────────────────────────────────────────────────────
document.getElementById('btn-restart').addEventListener('click', () => {
  isAnimating = false;
  chargeStart = null;
  chargeProgress = 0;
  chargeWrap.classList.remove('visible');
  chargeFill.style.strokeDashoffset = CIRCUMFERENCE;

  if (landMixer) landMixer.stopAllAction();
  if (roarMixer) roarMixer.stopAllAction();
  if (idleMixer) idleMixer.stopAllAction();
  if (landModel) landModel.visible = false;
  if (roarModel) roarModel.visible = false;
  if (idleModel) idleModel.visible = false;

  hasSummoned = false;
  document.getElementById('gesture-island').classList.remove('expanded');
  isIdling = false;
  prevHandCtrl = null;
  ctrlRotX = 0; ctrlRotY = 0;
  ctrlScale = 1;
  ctrlPanX = 0; ctrlPanY = 0;
  controlGroup.rotation.set(0, 0, 0);
  controlGroup.scale.setScalar(1);
  controlGroup.position.set(0, 0, 0);

  summonTextEl.classList.remove('visible');
  summonTextEl.className = '';

  setStatus('Raise both fists to summon Mahoraga!');
  startHintEl.classList.add('visible');
});

startCamera();
</script>
